name: Generate API Documentation

on:
  push:
    paths:
      - "src/metor/core/api/**"
      - "scripts/generate_api_docs.py"
      - ".github/workflows/generate_api_docs.yml"

jobs:
  build-and-commit-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the full history so the bot can push back to the branch cleanly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the Metor package and its dependencies from pyproject.toml
          # Required to prevent ModuleNotFoundError during strict DTO introspection
          pip install .

      - name: Execute API Doc Generator
        run: |
          python scripts/generate_api_docs.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add API_DOCS.md

          # Evaluate diff; commit and push only if the generation resulted in changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs(api): auto-update API_DOCS.md" && git push origin HEAD)
