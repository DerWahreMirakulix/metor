name: Release Wheel Bundles

"on":
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-wheel-bundles:
    name: Build Wheel Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Build Tools
        shell: bash
        run: |
          python -m pip install --upgrade pip==26.0.1
          pip install setuptools==80.10.2 wheel==0.46.3

      - name: Build Release Wheel Bundle
        shell: bash
        run: python scripts/build_release_wheelhouse.py --output-dir dist/release --skip-pip-upgrade

      - name: Smoke-Test Linux Bundle Installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          archive_path="$(find dist/release -maxdepth 1 -type f -name 'metor-wheelhouse-*.zip' | head -n 1)"
          extract_dir='dist/release-smoke'
          python -m zipfile -e "$archive_path" "$extract_dir"
          bundle_dir="$(find "$extract_dir" -mindepth 1 -maxdepth 1 -type d -name 'metor-wheelhouse-*' | head -n 1)"
          sh "$bundle_dir/install.sh"
          "$bundle_dir/.venv/bin/python" -m pip check
          "$bundle_dir/.venv/bin/python" -c "import metor; from metor.data.sql import SQLCIPHER_BACKEND; print(SQLCIPHER_BACKEND)"

      - name: Smoke-Test Windows Bundle Installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = (Get-ChildItem 'dist/release' -Filter 'metor-wheelhouse-*.zip' | Select-Object -First 1).FullName
          $extractDir = Join-Path $PWD 'dist/release-smoke'
          python -m zipfile -e $archivePath $extractDir
          $bundleDir = (Get-ChildItem $extractDir -Directory -Filter 'metor-wheelhouse-*' | Select-Object -First 1).FullName
          & "$bundleDir\install.cmd"
          & "$bundleDir\.venv\Scripts\python.exe" -m pip check
          & "$bundleDir\.venv\Scripts\python.exe" -c "import metor; from metor.data.sql import SQLCIPHER_BACKEND; print(SQLCIPHER_BACKEND)"

      - name: Upload Release Bundle Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: metor-wheel-bundle-${{ matrix.os }}
          path: dist/release/*.zip
          if-no-files-found: error

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-wheel-bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Bundle Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-artifacts

      - name: Publish Bundles To GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          tag_name="${GITHUB_REF_NAME}"
          if ! gh release view "$tag_name" >/dev/null 2>&1; then
            gh release create "$tag_name" --verify-tag --generate-notes
          fi
          while IFS= read -r -d '' archive_path; do
            gh release upload "$tag_name" "$archive_path" --clobber
          done < <(find dist/release-artifacts -type f -name '*.zip' -print0)
