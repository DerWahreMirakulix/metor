name: CI

on:
  push:
  pull_request:

jobs:
  python-quality:
    name: Python Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Shared Python Quality Checks
        uses: ./.github/actions/python-quality
        with:
          python-version: "3.11"
          ruff-check-paths: "src/metor/ scripts/ tests/"
          ruff-format-paths: "src/metor/ scripts/ tests/"
          mypy-paths: "src/metor/ scripts/"
          run-tests: "true"

      - name: Build Wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w dist
