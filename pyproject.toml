[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "metor"
version = "0.2"
description = "A simple Tor messenger."
authors = [{ name = "LuRex" }]
requires-python = ">=3.11"
license = { text = "GPLv3" }
dependencies = [
    "stem",
    "PySocks",
    "pynacl",
    "psutil",
    "python-dotenv",
    "sqlcipher3-binary",
]

[project.scripts]
metor = "metor.main:main"

[tool.setuptools]
include-package-data = true

[tool.ruff.format]
quote-style = "single"
